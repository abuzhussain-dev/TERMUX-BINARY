name: Build Headroom for aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust toolchain and crates
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: src/headroom_ai-*/target
          key: target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            target-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-maturin

      - name: Install maturin
        run: pip install maturin

      - name: Download and build headroom
        run: |
          pip download headroom-ai --no-binary :all: --no-deps -d ./src
          cd src && tar -xzf *.tar.gz
          cd $(find . -mindepth 1 -maxdepth 1 -type d | head -1)
          maturin build --release

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: headroom-aarch64-wheel
          path: src/*/target/wheels/*.whl
