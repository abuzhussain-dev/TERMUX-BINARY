name: Build Headroom for aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        uses: dtolnay/rust-action@v1
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install maturin
        run: pip install maturin

      - name: Download headroom source
        run: |
          pip download headroom-ai --no-binary :all: -d ./src
          cd src && tar -xzf headroom_ai-*.tar.gz

      - name: Build wheel
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd src/headroom_ai-*
          maturin build --release --target aarch64-unknown-linux-gnu

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: headroom-aarch64-wheel
          path: src/headroom_ai-*/target/wheels/*.whl
