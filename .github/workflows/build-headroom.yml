name: Build Headroom for aarch64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm  # ← ARM64 runner, no cross-compilation
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env

      - name: Install maturin
        run: |
          source $HOME/.cargo/env
          pip install maturin

      - name: Download and build headroom
        run: |
          pip download headroom-ai --no-binary :all: -d ./src
          cd src && tar -xzf *.tar.gz
          cd $(find . -mindepth 1 -maxdepth 1 -type d | head -1)
          source $HOME/.cargo/env
          maturin build --release

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: headroom-aarch64-wheel
          path: src/*/target/wheels/*.whl
